# vim: set ft=toml :


# https://github.com/jdx/mise/pull/10111
min_version = '2026.5.16'


[hooks]
postinstall = [{ task = 'hooks-install' }, { run = 'pixi install --all' }]


[settings]
experimental = true
locked = true
lockfile = true
lockfile_platforms = ['linux-arm64', 'linux-x64', 'macos-arm64']
unix_default_file_shell_args = 'sh -euo pipefail'
unix_default_inline_shell_args = 'sh -euo pipefail -c'


[tasks.all]
alias = 'default'
run = [{ task = 'dbt-run' }, { task = 'dbt-test' }, { task = 'mf' }]

[tasks.dbt-deps]
run = 'pixi run -- dbt deps'
sources = ['dependencies.yml']
outputs = ['dbt_packages', 'package-lock.yml']

[tasks.dbt-run]
depends = ['jafgen', 'dbt-deps']
run = 'pixi run -- dbt run'

[tasks.dbt-test]
run = 'pixi run -- dbt test'

[tasks.hooks-install]
hide = true
run = [{ task = 'hooks-uninstall' }, 'hk install --mise']

[tasks.hooks-uninstall]
hide = true
run = 'hk uninstall'

[tasks.jafgen]
outputs = ['jaffle-data/*.csv']
run = 'pixi run -- jafgen'
sources = ['jaffle-data/.gitignore']

[tasks.lint]
run = 'hk fix --all'

[tasks.lock]
# required to correctly initialize lockfile when locked = true
env.MISE_LOCKED = '0'
run = ['mise install', 'mise lock', 'pixi lock']

[tasks.mf]
run = [{ task = 'mf-health-checks' }, { task = 'mf-validate-configs' }]

[tasks.mf-health-checks]
run = 'pixi run -- mf health-checks'

[tasks.mf-validate-configs]
run = 'pixi run -- mf validate-configs --show-all --verbose-issues'

[tasks.upgrade]
# required to correctly initialize lockfile when locked = true
env.MISE_LOCKED = '0'
run = ['mise upgrade --local', 'mise lock', 'pixi update']


[tools]
hk = 'latest'
pixi = 'latest'
pkl = 'latest'
